name: Scraper Frecuentes

on:
  schedule:
    - cron: '*/10 * * * *'  # camaras cada 10 min
    - cron: '*/30 * * * *'  # cerrados cada 30 min
  workflow_dispatch:

jobs:
  camaras:
    name: Camaras (cada 10 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CONTABO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.238.26.6 >> ~/.ssh/known_hosts

      - name: Abrir túnel SSH a MongoDB
        run: |
          ssh -f -N -L 27017:localhost:27017 \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            root@194.238.26.6
          sleep 2

      - name: Scraper camaras
        env:
          MONGO_URI: mongodb://localhost:27017
        run: python extraeCamara.py

  cerrados:
    name: Cerrados/NOTAMs (cada 30 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CONTABO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.238.26.6 >> ~/.ssh/known_hosts

      - name: Abrir túnel SSH a MongoDB
        run: |
          ssh -f -N -L 27017:localhost:27017 \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            root@194.238.26.6
          sleep 2

      - name: Scraper cerrados/NOTAMs
        env:
          MONGO_URI: mongodb://localhost:27017
        run: python extraeCerrados.py
