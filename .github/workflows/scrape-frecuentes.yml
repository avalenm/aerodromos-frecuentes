name: Scraper Frecuentes

on:
  schedule:
    - cron: '*/10 * * * *'  # camaras cada 10 min
    - cron: '*/30 * * * *'  # cerrados cada 30 min
  workflow_dispatch:

jobs:
  camaras:
    name: Camaras (cada 10 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scraper camaras
        env:
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: '1'
        run: python -u extraeCamara.py

  cerrados:
    name: Cerrados/NOTAMs (cada 30 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scraper cerrados/NOTAMs
        env:
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python extraeCerrados.py
